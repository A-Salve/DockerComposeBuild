<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Project Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #0a0a0f; color: #e2e8f0; overflow-x: hidden; }
    :root {
      --accent: #7c3aed;
      --accent-light: #a78bfa;
      --accent-glow: rgba(124, 58, 237, 0.3);
      --surface: #111118;
      --surface-2: #1a1a24;
      --surface-3: #22222f;
      --border: rgba(255,255,255,0.08);
      --text: #e2e8f0;
      --text-muted: #64748b;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d2d3d; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3d3d4d; }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
