services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
     test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
     interval: 5s
     timeout: 5s
     retries: 10 
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
     DB_URL: ${DB_URL}
     DB_HOST: postgres
     DB_USER: ${DB_USER}
     DB_PASSWORD: ${DB_PASSWORD}
     DB_NAME: ${DB_NAME}
     JWT_SECRET: your_super_secret_jwt_key_change_in_production
     PORT: 8080
     NOTIFICATION_SERVICE_URL: http://notification-service:8081
     ANALYTICS_SERVICE_URL: http://analytics-service:8082
    depends_on:
      postgres:
       condition: service_healthy
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
       
  frontend:
    build: ./frontend

    depends_on:
      - backend
      - analytics
    volumes:
      - frontend-build:/app/build

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend-build:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - backend
      - analytics

  notification: 
    build: ./notification-service
    ports:
      - "8081:8081"
    depends_on:
      - redis
    environment:
      REDIS_URL: redis:6379
    

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  analytics:
    build: ./analytics-service 
    ports: 
      - "8082:8082"
    depends_on:
      - postgres
    environment:
     DB_URL: ${DB_URL}
     DB_HOST: postgres
     DB_USER: ${DB_USER}
     DB_PASSWORD: ${DB_PASSWORD}
     DB_NAME: ${DB_NAME}

volumes:
    redis-data:
    frontend-build:
    postgres_data:
