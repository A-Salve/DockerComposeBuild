services:

  postgres:
    container_name: postgres-taskflow
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
     test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
     interval: 5s
     timeout: 5s
     retries: 10 
  backend:
    container_name: backend-taskflow
    build: ./backend
    ports:
      - "8080:8080"
    environment:
     DB_URL: ${DB_URL}
     DB_HOST: postgres
     DB_USER: ${DB_USER}
     DB_PASSWORD: ${DB_PASSWORD}
     DB_NAME: ${DB_NAME}
     JWT_SECRET: your_super_secret_jwt_key_change_in_production
     PORT: 8080
     NOTIFICATION_SERVICE_URL: http://notification-service:8081
     ANALYTICS_SERVICE_URL: http://analytics-service:8082
    depends_on:
      postgres:
       condition: service_healthy
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
       
  frontend:
    container_name: frontend-taskflow
    build: ./frontend

    depends_on:
      - backend
      - analytics
    volumes:
      - frontend-build:/app/build

  nginx:
    container_name: nginx-taskflow
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend-build:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - backend
      - analytics

  notification: 
    build: ./notification-service
    ports:
      - "8081:8081"
    depends_on:
      - redis
    environment:
      REDIS_URL: redis:6379
    

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  analytics:
    build: ./analytics-service 
    ports: 
      - "8082:8082"
    depends_on:
      - postgres
    environment:
     DB_URL: ${DB_URL}
     DB_HOST: postgres
     DB_USER: ${DB_USER}
     DB_PASSWORD: ${DB_PASSWORD}
     DB_NAME: ${DB_NAME}


  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
     - "9090:9090"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    command:
      - --port=8083
    ports:
      - "8083:8083"
    volumes:
       - /var/run/docker.sock:/var/run/docker.sock:ro
       - /sys:/sys:ro
       - /var/lib/docker/:/var/lib/docker:ro 

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
     - "9100:9100"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
     - "9200:9200"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.2
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.2
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
    depends_on:
      - elasticsearch

volumes:
    redis-data:
    frontend-build:
    postgres_data:



