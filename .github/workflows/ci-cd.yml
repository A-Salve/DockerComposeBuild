name: CI/CD Local Deployment

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Check runner
        run: whoami && pwd

      - name: Update code
        run: git -C /home/gitrunner/DockerComposeBuild pull

      - name: Build images
        run: |
          cd /home/gitrunner/DockerComposeBuild
          docker compose build

      - name: Test containers
        run: |
          cd /home/gitrunner/DockerComposeBuild
          docker compose up -d
          sleep 20
          curl --fail http://localhost || (docker-compose logs && exit 1)
          docker compose down

      - name: Deploy
        run: |
          cd /home/gitrunner/DockerComposeBuild
          docker compose pull
          docker compose up -d --remove-orphans
